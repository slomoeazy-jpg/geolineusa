<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery</title>
  <style>
    body {
      margin: 0;
      font-family: Inter, system-ui, sans-serif;
      background: #f8fafc;
      color: #0f172a;
    }

    header {
      height: 100vh;
      background: linear-gradient(rgba(0, 0, 0, 0.55), rgba(0, 0, 0, 0.55)),
        url('https://images.unsplash.com/photo-1513104890138-7c749659a591?auto=format&fit=crop&w=1800&q=80');
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: #ffffff;
      padding: 0 1.5rem;
    }

    header .hero-content {
      max-width: 700px;
    }

    header h1 {
      margin: 0;
      font-size: clamp(2.75rem, 6vw, 5rem);
      line-height: 1;
      letter-spacing: -0.05em;
    }

    header p {
      margin: 1.25rem auto 0;
      max-width: 32rem;
      font-size: 1.1rem;
      color: rgba(255, 255, 255, 0.9);
      line-height: 1.8;
    }

    .page-wrapper {
      max-width: 1200px;
      margin: 0 auto;
      padding: 3rem 1.5rem 4rem;
    }

    .section-title {
      font-size: clamp(2rem, 2.5vw, 2.75rem);
      margin: 0 0 1.5rem;
      letter-spacing: -0.03em;
      font-weight: 700;
    }

    .gallery {
      display: grid;
      gap: 1rem;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    }

    .gallery img {
      width: 100%;
      height: 100%;
      min-height: 220px;
      object-fit: cover;
      border-radius: 1rem;
      box-shadow: 0 20px 50px rgba(15, 23, 42, 0.08);
      transition: transform 0.25s ease, filter 0.25s ease;
    }

    .gallery img:hover {
      transform: translateY(-4px) scale(1.01);
      filter: saturate(1.05);
    }
  </style>
</head>
<body>
  <header>
    <div class="hero-content">
      <h1>Fresh flavors for every moment</h1>
      <p>Discover a curated gallery of delicious food truck dishes, street eats, and catering inspiration set against a bold hero background.</p>
    </div>
  </header>

  <div class="page-wrapper">
    <section>
      <h2 class="section-title">Gallery</h2>
      <div class="gallery">
        <img src="https://images.unsplash.com/photo-1619740455993-f5f4a4a5d6f6?auto=format&fit=crop&w=1200&q=80" alt="Twin Treats Food Truck" />
        <img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?auto=format&fit=crop&w=1200&q=80" alt="Fresh Pizza" />
        <img src="https://images.unsplash.com/photo-1563805042-7684c019e1cb?auto=format&fit=crop&w=1200&q=80" alt="Ice Cream" />
        <img src="https://images.unsplash.com/photo-1544025162-d76694265947?auto=format&fit=crop&w=1200&q=80" alt="Mediterranean Cuisine" />
        <img src="https://images.unsplash.com/photo-1555244162-803834f70033?auto=format&fit=crop&w=1200&q=80" alt="Catering Event" />
        <img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&w=1200&q=80" alt="Food Truck Catering" />
      </div>
    </section>
  </div>
</body>
</html>
